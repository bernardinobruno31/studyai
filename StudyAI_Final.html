<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAI - Estude com IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-slide-in {
            animation: slideIn 0.4s ease-out;
        }
        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        class StudyAI {
            constructor() {
                this.apiKey = null;
                this.pdfText = '';
                this.questions = [];
                this.currentQuestionIndex = 0;
                this.selectedAnswer = null;
                this.showFeedback = false;
                this.stats = { correct: 0, total: 0 };
                this.fileName = '';
                this.isLoading = false;
                this.tokensUsed = { input: 0, output: 0, total: 0 };
                this.tokenPrice = { input: 0.000075, output: 0.0003 };
                this.showApiKeyModal = true;
                this.apiKeyInput = '';
                this.difficulty = null;
                this.testsUsedToday = this.getTestsUsedToday();
                this.hasQuestions = false;
                this.render();
            }

            getTestsUsedToday() {
                const today = new Date().toDateString();
                const stored = localStorage.getItem('studyai_tests_date');
                const count = localStorage.getItem('studyai_tests_count');
                
                if (stored !== today) {
                    localStorage.setItem('studyai_tests_date', today);
                    localStorage.setItem('studyai_tests_count', '0');
                    return 0;
                }
                return parseInt(count) || 0;
            }

            addTestUsed() {
                this.testsUsedToday++;
                localStorage.setItem('studyai_tests_count', this.testsUsedToday.toString());
            }

            canUseMoreTests() {
                return this.testsUsedToday < 3;
            }

            async extractTextFromPDF(file) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    
                    let text = '';
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const pageText = content.items
                            .map(item => item.str)
                            .join(' ');
                        text += pageText + '\n';
                    }
                    
                    return text;
                } catch (error) {
                    throw new Error('Erro ao ler PDF: ' + error.message);
                }
            }

            async generateQuestionsWithGemini(pdfText) {
                try {
                    const difficultyInstructions = {
                        'fácil': 'FÁCIL - questões básicas com conceitos diretos do texto',
                        'médio': 'MÉDIO - questões que aplicam conceitos do texto',
                        'difícil': 'DIFÍCIL - questões desafiadoras com casos complexos'
                    };

                    const difficulty = this.difficulty || 'médio';
                    const difficultyText = difficultyInstructions[difficulty];

                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKey}`,
                        {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                contents: [
                                    {
                                        parts: [
                                            {
                                                text: `Você é um professor especializado em criar questões de múltipla escolha.

PRIMEIRO, analise o PDF:
1. SE TEM questões formatadas (numeradas 1, 2, 3... com alternativas A, B, C, D):
   - EXTRAIA TODAS as questões exatamente como estão
   - Mantenha a ordem original
   - Retorne em JSON

2. SE NÃO TEM questões formatadas (é um resumo, artigo, anotações):
   - GERE 6 questões novas de nível ${difficultyText}
   - Retorne em JSON

FORMATO JSON ESPERADO:
[
  {
    "id": 1,
    "question": "A pergunta aqui?",
    "alternatives": ["Opção A", "Opção B", "Opção C", "Opção D"],
    "correctAnswer": 0,
    "explanation": "Explicação..."
  }
]

Retorne APENAS o JSON, sem markdown ou explicações extras.

PDF:
${pdfText}`
                                            }
                                        ]
                                    }
                                ],
                                generationConfig: {
                                    temperature: 0.7,
                                    topK: 40,
                                    topP: 0.95,
                                    maxOutputTokens: 4096,
                                }
                            })
                        }
                    );

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(`Erro Gemini: ${error.error?.message || 'Desconhecido'}`);
                    }

                    const data = await response.json();
                    
                    const inputTokens = Math.ceil(pdfText.length / 4);
                    const outputTokens = Math.ceil(data.candidates[0].content.parts[0].text.length / 4);
                    
                    this.tokensUsed.input += inputTokens;
                    this.tokensUsed.output += outputTokens;
                    this.tokensUsed.total = this.tokensUsed.input + this.tokensUsed.output;

                    const responseText = data.candidates[0].content.parts[0].text;

                    const cleanJson = responseText
                        .replace(/```json\n?/g, '')
                        .replace(/```\n?/g, '')
                        .trim();

                    const questions = JSON.parse(cleanJson);
                    return questions;
                } catch (error) {
                    throw new Error('Erro ao processar: ' + error.message);
                }
            }

            async handleFileUpload(event) {
                const file = event.target.files[0];
                if (!file) return;

                if (!this.canUseMoreTests()) {
                    alert('Você atingiu o limite de 3 testes por dia! Nos dê seu feedback para desbloqueamos mais.');
                    return;
                }

                this.fileName = file.name;
                this.isLoading = true;
                this.difficulty = null;
                this.render();
                
                try {
                    const pdfText = await this.extractTextFromPDF(file);
                    this.pdfText = pdfText;
                    this.isLoading = false;
                    this.showDifficultySelector = true;
                    this.render();
                } catch (error) {
                    alert(`Erro: ${error.message}`);
                    this.isLoading = false;
                    this.render();
                }
            }

            async processPDF() {
                if (!this.difficulty) {
                    alert('Selecione uma dificuldade');
                    return;
                }

                this.isLoading = true;
                this.showDifficultySelector = false;
                this.render();
                
                try {
                    const generatedQuestions = await this.generateQuestionsWithGemini(this.pdfText);
                    
                    if (!Array.isArray(generatedQuestions) || generatedQuestions.length === 0) {
                        throw new Error('Nenhuma questão foi gerada');
                    }
                    
                    this.questions = generatedQuestions;
                    this.currentQuestionIndex = 0;
                    this.selectedAnswer = null;
                    this.showFeedback = false;
                    this.stats = { correct: 0, total: generatedQuestions.length };
                    this.addTestUsed();
                    
                } catch (error) {
                    alert(`Erro: ${error.message}`);
                } finally {
                    this.isLoading = false;
                    this.render();
                }
            }

            handleAnswerSelect(index) {
                if (this.showFeedback) return;
                this.selectedAnswer = index;
                this.showFeedback = true;

                if (index === this.questions[this.currentQuestionIndex].correctAnswer) {
                    this.stats.correct++;
                }
                this.render();
            }

            handleNextQuestion() {
                if (this.currentQuestionIndex < this.questions.length - 1) {
                    this.currentQuestionIndex++;
                    this.selectedAnswer = null;
                    this.showFeedback = false;
                    this.render();
                }
            }

            handleRestart() {
                this.currentQuestionIndex = 0;
                this.selectedAnswer = null;
                this.showFeedback = false;
                this.stats = { correct: 0, total: this.questions.length };
                this.render();
            }

            handleNewFile() {
                this.questions = [];
                this.currentQuestionIndex = 0;
                this.selectedAnswer = null;
                this.showFeedback = false;
                this.stats = { correct: 0, total: 0 };
                this.pdfText = '';
                this.fileName = '';
                this.difficulty = null;
                this.showDifficultySelector = false;
                this.render();
            }

            setApiKey() {
                if (this.apiKeyInput.trim()) {
                    this.apiKey = this.apiKeyInput.trim();
                    this.showApiKeyModal = false;
                    this.render();
                } else {
                    alert('Por favor, cole sua chave de API do Gemini');
                }
            }

            getCostEstimate() {
                const inputCost = this.tokensUsed.input * this.tokenPrice.input;
                const outputCost = this.tokensUsed.output * this.tokenPrice.output;
                return inputCost + outputCost;
            }

            renderApiKeyModal() {
                return `
                    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                            <div class="text-center mb-6">
                                <div class="inline-block mb-4 p-3 bg-gradient-to-br from-blue-500 to-teal-500 rounded-full">
                                    <i class="fas fa-key text-white text-2xl"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-900 mb-2">Cole sua API Key</h2>
                                <p class="text-gray-600 text-sm">Google Gemini (grátis em aistudio.google.com/apikey)</p>
                            </div>

                            <div class="mb-6">
                                <textarea
                                    id="apiKeyInput"
                                    class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none resize-none"
                                    placeholder="Cole aqui: AIzaSy..."
                                    rows="3"
                                ></textarea>
                            </div>

                            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded mb-6">
                                <p class="text-sm text-blue-900">
                                    <strong>Segurança:</strong> Sua chave fica apenas no seu navegador.
                                </p>
                            </div>

                            <button
                                onclick="window.app.apiKeyInput = document.getElementById('apiKeyInput').value; window.app.setApiKey();"
                                class="w-full bg-gradient-to-r from-blue-500 to-teal-500 hover:from-blue-600 hover:to-teal-600 text-white font-bold py-3 rounded-xl transition-all duration-200"
                            >
                                Continuar
                            </button>

                            <p class="text-xs text-gray-500 text-center mt-4">
                                Sem chave? <a href="https://aistudio.google.com/apikey" target="_blank" class="text-blue-500 hover:underline">Crie aqui (grátis)</a>
                            </p>
                        </div>
                    </div>
                `;
            }

            renderDifficultySelector() {
                return `
                    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                            <div class="text-center mb-8">
                                <h2 class="text-2xl font-bold text-gray-900 mb-2">Escolha a dificuldade</h2>
                                <p class="text-gray-600 text-sm">Arquivo: <strong>${this.fileName}</strong></p>
                            </div>

                            <div class="space-y-3 mb-6">
                                <button
                                    onclick="window.app.difficulty = 'fácil'; window.app.processPDF();"
                                    class="w-full p-4 border-2 border-green-200 rounded-xl hover:bg-green-50 hover:border-green-500 transition-all text-left"
                                >
                                    <p class="font-bold text-green-700">🟢 Fácil</p>
                                    <p class="text-xs text-gray-600">Conceitos básicos diretos do material</p>
                                </button>

                                <button
                                    onclick="window.app.difficulty = 'médio'; window.app.processPDF();"
                                    class="w-full p-4 border-2 border-yellow-200 rounded-xl hover:bg-yellow-50 hover:border-yellow-500 transition-all text-left"
                                >
                                    <p class="font-bold text-yellow-700">🟡 Médio</p>
                                    <p class="text-xs text-gray-600">Aplicação e conexão de conceitos</p>
                                </button>

                                <button
                                    onclick="window.app.difficulty = 'difícil'; window.app.processPDF();"
                                    class="w-full p-4 border-2 border-red-200 rounded-xl hover:bg-red-50 hover:border-red-500 transition-all text-left"
                                >
                                    <p class="font-bold text-red-700">🔴 Difícil</p>
                                    <p class="text-xs text-gray-600">Casos complexos e raciocínio crítico</p>
                                </button>
                            </div>

                            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded text-sm">
                                <p class="text-blue-900">
                                    <strong>💡 Dica:</strong> Se é um choice/simulado, a IA extrai as questões. Se é um resumo, a IA gera questões novas.
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderUploadScreen() {
                const testsRemaining = 3 - this.testsUsedToday;
                
                return `
                    <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-teal-50 flex items-center justify-center px-4 py-8">
                        <div class="max-w-md w-full">
                            <div class="text-center mb-12">
                                <div class="inline-block mb-4 p-4 bg-gradient-to-br from-blue-500 to-teal-500 rounded-2xl shadow-lg">
                                    <i class="fas fa-brain text-white text-2xl"></i>
                                </div>
                                <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-600 to-teal-600 bg-clip-text text-transparent mb-3">
                                    StudyAI
                                </h1>
                                <p class="text-gray-600 text-lg font-medium">Estude respondendo questões</p>
                                ${this.apiKey ? `<p class="text-xs text-green-600 mt-2">✅ API conectada</p>` : ''}
                            </div>

                            <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8">
                                <div 
                                    class="border-2 border-dashed border-blue-200 rounded-2xl p-8 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all duration-300"
                                    onclick="${this.canUseMoreTests() ? "document.getElementById('fileInput').click()" : "alert('Limite diário atingido')"}"
                                >
                                    ${this.isLoading ? `
                                        <div class="flex flex-col items-center">
                                            <div class="spinner mb-4"></div>
                                            <p class="text-gray-700 font-bold text-lg">Processando PDF...</p>
                                            <p class="text-gray-500 text-sm mt-2">Lendo arquivo...</p>
                                        </div>
                                    ` : `
                                        <div class="flex flex-col items-center">
                                            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4">
                                                <i class="fas fa-file-pdf text-blue-500 text-2xl"></i>
                                            </div>
                                            <p class="text-gray-900 font-bold text-lg mb-1">Envie seu PDF</p>
                                            <p class="text-gray-500 text-sm">Choice, resumo, artigo...</p>
                                            <p class="text-gray-400 text-xs mt-3">Nós extraímos ou geramos questões</p>
                                        </div>
                                    `}
                                </div>
                                <input
                                    id="fileInput"
                                    type="file"
                                    accept=".pdf"
                                    class="hidden"
                                    onchange="window.app.handleFileUpload(event)"
                                    ${this.isLoading ? 'disabled' : ''}
                                />
                            </div>

                            <div class="space-y-3 mb-8">
                                <div class="bg-white rounded-xl p-4 flex items-start space-x-3 shadow-md">
                                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                                        <i class="fas fa-check text-blue-600"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-900 text-sm">Extrai ou Gera</p>
                                        <p class="text-xs text-gray-600">Choice → extrai | Resumo → gera</p>
                                    </div>
                                </div>

                                <div class="bg-white rounded-xl p-4 flex items-start space-x-3 shadow-md">
                                    <div class="w-10 h-10 rounded-full bg-teal-100 flex items-center justify-center flex-shrink-0">
                                        <i class="fas fa-check text-teal-600"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-900 text-sm">Dificuldade</p>
                                        <p class="text-xs text-gray-600">Fácil, Médio ou Difícil</p>
                                    </div>
                                </div>

                                <div class="bg-white rounded-xl p-4 flex items-start space-x-3 shadow-md">
                                    <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center flex-shrink-0">
                                        <i class="fas fa-check text-purple-600"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-900 text-sm">Feedback</p>
                                        <p class="text-xs text-gray-600">Responda e aprenda</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-gradient-to-r from-blue-50 to-teal-50 rounded-xl p-4 text-center text-sm mb-4">
                                <p class="text-gray-700 font-semibold mb-2">📊 Testes disponíveis hoje</p>
                                <div class="flex justify-center space-x-2">
                                    ${[1,2,3].map(i => `
                                        <div class="w-8 h-8 rounded-full flex items-center justify-center ${i <= testsRemaining ? 'bg-green-500 text-white' : 'bg-gray-300 text-white'}">
                                            <i class="fas fa-check text-xs"></i>
                                        </div>
                                    `).join('')}
                                </div>
                                <p class="text-xs text-gray-600 mt-2">${testsRemaining} de 3 disponíveis</p>
                            </div>

                            ${this.apiKey ? `
                                <button
                                    onclick="window.app.apiKey = null; window.app.showApiKeyModal = true; window.app.render();"
                                    class="w-full text-sm text-gray-500 hover:text-gray-700 transition-colors"
                                >
                                    Trocar API Key
                                </button>
                            ` : ''}

                            <p class="text-center text-xs text-gray-500 mt-4">
                                StudyAI v1.0 • Gemini API
                            </p>
                        </div>
                    </div>
                `;
            }

            renderQuizScreen() {
                const currentQuestion = this.questions[this.currentQuestionIndex];
                const isAnswered = this.selectedAnswer !== null;
                const isCorrect = this.selectedAnswer === currentQuestion.correctAnswer;
                const isLastQuestion = this.currentQuestionIndex === this.questions.length - 1;
                const progress = ((this.currentQuestionIndex + 1) / this.questions.length) * 100;

                return `
                    <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-teal-50 flex flex-col">
                        <div class="bg-white border-b border-gray-100 px-4 py-4 sticky top-0 z-10 shadow-sm">
                            <div class="max-w-2xl mx-auto">
                                <div class="flex items-center justify-between mb-3">
                                    <button
                                        onclick="window.app.handleNewFile()"
                                        class="flex items-center space-x-2 text-gray-600 hover:text-gray-900 font-semibold text-sm transition-colors"
                                    >
                                        <i class="fas fa-arrow-left text-sm"></i>
                                        <span>Novo PDF</span>
                                    </button>
                                    <span class="text-sm font-bold text-gray-700">
                                        ${this.currentQuestionIndex + 1} / ${this.questions.length}
                                    </span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                                    <div
                                        class="bg-gradient-to-r from-blue-500 to-teal-500 h-2 rounded-full transition-all duration-500"
                                        style="width: ${progress}%"
                                    ></div>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 flex items-center justify-center px-4 py-8">
                            <div class="max-w-2xl w-full animate-slide-in">
                                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
                                    <div class="p-8 bg-gradient-to-r from-blue-50 to-teal-50 border-b border-gray-100">
                                        <p class="text-gray-500 text-xs font-bold mb-3 uppercase tracking-widest">Questão ${this.currentQuestionIndex + 1}</p>
                                        <h2 class="text-3xl font-bold text-gray-900 leading-tight">
                                            ${currentQuestion.question}
                                        </h2>
                                    </div>

                                    <div class="p-8 space-y-3">
                                        ${currentQuestion.alternatives.map((alternative, index) => `
                                            <button
                                                onclick="window.app.handleAnswerSelect(${index})"
                                                ${isAnswered ? 'disabled' : ''}
                                                class="
                                                    w-full p-4 rounded-xl text-left font-semibold transition-all duration-300
                                                    flex items-center space-x-3 text-base
                                                    ${!isAnswered ? 'cursor-pointer hover:shadow-lg' : 'cursor-default'}
                                                    ${this.selectedAnswer === index ? (
                                                        isCorrect
                                                            ? 'bg-gradient-to-r from-green-100 to-emerald-100 border-2 border-green-500 text-green-900 shadow-lg'
                                                            : 'bg-gradient-to-r from-red-100 to-rose-100 border-2 border-red-500 text-red-900 shadow-lg'
                                                    ) : isAnswered && index === currentQuestion.correctAnswer ? (
                                                        'bg-gradient-to-r from-green-100 to-emerald-100 border-2 border-green-500 text-green-900'
                                                    ) : (
                                                        'bg-gray-50 border-2 border-gray-200 text-gray-700 hover:bg-gradient-to-r hover:from-blue-50 hover:to-blue-100 hover:border-blue-300'
                                                    )}
                                                "
                                            >
                                                <div class="
                                                    w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-sm
                                                    transition-all duration-300
                                                    ${this.selectedAnswer === index ? (
                                                        isCorrect
                                                            ? 'bg-green-500 text-white shadow-lg'
                                                            : 'bg-red-500 text-white shadow-lg'
                                                    ) : isAnswered && index === currentQuestion.correctAnswer ? (
                                                        'bg-green-500 text-white'
                                                    ) : (
                                                        'bg-gray-300 text-white'
                                                    )}
                                                ">
                                                    ${String.fromCharCode(65 + index)}
                                                </div>
                                                <span class="flex-1">${alternative}</span>
                                                ${this.selectedAnswer === index && isCorrect ? `
                                                    <i class="fas fa-check-circle text-green-500 text-lg"></i>
                                                ` : this.selectedAnswer === index && !isCorrect ? `
                                                    <i class="fas fa-times-circle text-red-500 text-lg"></i>
                                                ` : isAnswered && index === currentQuestion.correctAnswer ? `
                                                    <i class="fas fa-check-circle text-green-500 text-lg"></i>
                                                ` : ''}
                                            </button>
                                        `).join('')}
                                    </div>

                                    ${isAnswered ? `
                                        <div class="
                                            p-6 border-t-2
                                            ${isCorrect 
                                                ? 'bg-gradient-to-r from-green-50 to-emerald-50 border-green-200' 
                                                : 'bg-gradient-to-r from-orange-50 to-amber-50 border-orange-200'
                                            }
                                        ">
                                            <div class="flex items-start space-x-3">
                                                <div class="
                                                    w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5
                                                    ${isCorrect ? 'bg-green-500' : 'bg-orange-500'}
                                                ">
                                                    <i class="fas fa-${isCorrect ? 'check' : 'times'} text-white text-xs"></i>
                                                </div>
                                                <div class="flex-1">
                                                    <p class="font-bold mb-2 text-lg ${isCorrect ? 'text-green-900' : 'text-orange-900'}">
                                                        ${isCorrect ? '✨ Parabéns!' : '💡 Explicação'}
                                                    </p>
                                                    <p class="text-sm leading-relaxed ${isCorrect ? 'text-green-800' : 'text-orange-800'}">
                                                        ${currentQuestion.explanation}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>

                                ${isAnswered ? `
                                    <div class="mt-6">
                                        ${!isLastQuestion ? `
                                            <button
                                                onclick="window.app.handleNextQuestion()"
                                                class="w-full bg-gradient-to-r from-blue-500 to-teal-500 hover:from-blue-600 hover:to-teal-600 text-white font-bold py-4 px-6 rounded-xl transition-all duration-200 flex items-center justify-center space-x-2 shadow-lg hover:shadow-xl active:scale-95"
                                            >
                                                <span>Próxima Questão</span>
                                                <i class="fas fa-chevron-right"></i>
                                            </button>
                                        ` : `
                                            <button
                                                onclick="window.app.handleRestart()"
                                                class="w-full bg-gradient-to-r from-blue-500 to-teal-500 hover:from-blue-600 hover:to-teal-600 text-white font-bold py-4 px-6 rounded-xl transition-all duration-200 flex items-center justify-center space-x-2 shadow-lg hover:shadow-xl active:scale-95"
                                            >
                                                <i class="fas fa-redo"></i>
                                                <span>Refazer Quiz</span>
                                            </button>
                                        `}
                                    </div>

                                    <div class="mt-6 grid grid-cols-3 gap-3">
                                        <div class="bg-white rounded-2xl p-4 text-center shadow-md hover:shadow-lg transition-all">
                                            <p class="text-gray-500 text-xs font-bold mb-1 uppercase">Corretas</p>
                                            <p class="text-3xl font-bold text-green-600">${this.stats.correct}</p>
                                        </div>
                                        <div class="bg-white rounded-2xl p-4 text-center shadow-md hover:shadow-lg transition-all">
                                            <p class="text-gray-500 text-xs font-bold mb-1 uppercase">Total</p>
                                            <p class="text-3xl font-bold text-gray-800">${this.stats.total}</p>
                                        </div>
                                        <div class="bg-white rounded-2xl p-4 text-center shadow-md hover:shadow-lg transition-all">
                                            <p class="text-gray-500 text-xs font-bold mb-1 uppercase">Taxa</p>
                                            <p class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-teal-600 bg-clip-text text-transparent">
                                                ${Math.round((this.stats.correct / this.stats.total) * 100)}%
                                            </p>
                                        </div>
                                    </div>

                                    <div class="mt-6 bg-gradient-to-r from-blue-50 to-teal-50 rounded-xl p-4 text-sm">
                                        <p class="text-gray-700 font-semibold mb-2">📊 Tokens desta sessão</p>
                                        <div class="grid grid-cols-3 gap-2 text-xs">
                                            <div class="bg-white rounded p-2">
                                                <p class="text-gray-600">Input</p>
                                                <p class="font-bold text-blue-600">${this.tokensUsed.input}</p>
                                            </div>
                                            <div class="bg-white rounded p-2">
                                                <p class="text-gray-600">Output</p>
                                                <p class="font-bold text-teal-600">${this.tokensUsed.output}</p>
                                            </div>
                                            <div class="bg-white rounded p-2">
                                                <p class="text-gray-600">Custo</p>
                                                <p class="font-bold text-green-600">$${this.getCostEstimate().toFixed(4)}</p>
                                            </div>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            render() {
                const app = document.getElementById('app');
                
                if (this.showApiKeyModal && !this.apiKey) {
                    app.innerHTML = this.renderApiKeyModal();
                } else if (this.showDifficultySelector) {
                    app.innerHTML = this.renderDifficultySelector();
                } else if (this.questions.length === 0) {
                    app.innerHTML = this.renderUploadScreen();
                } else {
                    app.innerHTML = this.renderQuizScreen();
                }
            }
        }

        window.app = new StudyAI();
    </script>
</body>
</html>
